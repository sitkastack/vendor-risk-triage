name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify pyproject.toml version matches FRAMEWORK_VERSION
        run: |
          python scripts/check_version_sync.py
          if [ $? -ne 0 ]; then
            echo "::error::pyproject.toml version and _version.FRAMEWORK_VERSION disagree. Sync them and commit."
            exit 1
          fi

      - name: Verify CHANGELOG.md is current with _version.py history
        run: |
          python scripts/extract_changelog.py --check
          if [ $? -ne 0 ]; then
            echo "::error::CHANGELOG.md is stale. Regenerate it via 'python scripts/extract_changelog.py' and commit."
            exit 1
          fi

      - name: Verify schemas are valid JSON Schema 2020-12
        run: |
          python -c "
          import glob
          import json
          from jsonschema import Draft202012Validator
          schemas = sorted(glob.glob('schemas/*.schema.json'))
          assert schemas, 'no schema files found under schemas/'
          for schema_file in schemas:
              with open(schema_file) as f:
                  schema = json.load(f)
              Draft202012Validator.check_schema(schema)
              print(f'OK: {schema_file} is valid JSON Schema 2020-12')
          "

      - name: Run pytest with coverage
        run: pytest -v --cov=_version --cov=agent --cov=cli --cov=eval --cov=ingestion --cov=observability --cov=pricing --cov=resilience --cov=retrieval --cov=reporting --cov=tenancy --cov=migration --cov-report=term-missing --cov-fail-under=95

      - name: Check for classification drift against baseline
        run: |
          python scripts/check_drift.py
          if [ $? -ne 0 ]; then
            echo "::error::Classification drift detected. Investigate the diff above. If the drift is intentional, regenerate the baseline locally via 'python scripts/check_drift.py --update-baseline' and commit the updated file."
            exit 1
          fi
          echo "OK: No drift detected against baseline"

      - name: Check SYSTEM_PROMPT_HASH matches committed baseline
        run: |
          python scripts/check_system_prompt_hash.py
          if [ $? -ne 0 ]; then
            echo "::error::SYSTEM_PROMPT_HASH drift detected. The framework system prompt has changed but baselines/system_prompt_hash.txt was not updated. If the prompt edit is intentional, run 'python scripts/check_system_prompt_hash.py --update-baseline' locally and commit both the prompt edit and the new baseline together."
            exit 1
          fi

      - name: Check for em dashes in markdown
        run: |
          if grep -rn "—" docs/ README.md CONTRIBUTING.md CODE_OF_CONDUCT.md SECURITY.md 2>/dev/null; then
            echo "::error::Em dashes found in markdown. Use parentheses or commas instead."
            exit 1
          else
            echo "OK: No em dashes found in markdown"
          fi
